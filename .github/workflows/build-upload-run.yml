name: Build and Deploy Recruitment Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          VITE_APP_BASE_PATH: ${{ secrets.VITE_APP_BASE_PATH }}
        run: npm run build

      - name: Create deploy archive
        run: tar -czf dist.tar.gz dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: recruitment-dist
          path: dist.tar.gz
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: recruitment-dist

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa_deploy
          chmod 600 ~/.ssh/id_rsa_deploy
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload artifact to VPS
        run: |
          scp -i ~/.ssh/id_rsa_deploy dist.tar.gz "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/recruitment-dist.tar.gz"

      - name: Deploy dist to Apache web root
        run: |
          ssh -i ~/.ssh/id_rsa_deploy "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'bash -s' << 'EOF'
          set -euo pipefail

          DEPLOY_USER="$(whoami)"
          DEPLOY_ROOT="${{ secrets.VPS_DEPLOY_ROOT }}"
          WEB_ROOT="${{ secrets.VPS_WEB_ROOT }}"
          APP_BASE_PATH="${{ secrets.VITE_APP_BASE_PATH }}"
          if [ -z "${WEB_ROOT}" ]; then
            WEB_ROOT="/home/${DEPLOY_USER}/recruitment/frontend"
          fi
          if [ -z "${APP_BASE_PATH}" ]; then
            APP_BASE_PATH="/"
          fi
          case "${APP_BASE_PATH}" in
            */) ;;
            *) APP_BASE_PATH="${APP_BASE_PATH}/" ;;
          esac
          TMP_ARCHIVE="/tmp/recruitment-dist.tar.gz"
          TMP_DIR="/tmp/recruitment-dist"

          rm -rf "${TMP_DIR}"
          mkdir -p "${TMP_DIR}"
          tar -xzf "${TMP_ARCHIVE}" -C "${TMP_DIR}"

          mkdir -p "${WEB_ROOT}"
          rm -rf "${WEB_ROOT:?}"/*
          cp -a "${TMP_DIR}/dist/." "${WEB_ROOT}/"

          cat > "${WEB_ROOT}/.htaccess" << 'HTACCESS'
          RewriteEngine On
          RewriteBase __APP_BASE_PATH__
          RewriteCond %{REQUEST_FILENAME} -f [OR]
          RewriteCond %{REQUEST_FILENAME} -d
          RewriteRule ^ - [L]
          RewriteRule . __APP_BASE_PATH__index.html [L]
          HTACCESS
          sed -i "s|__APP_BASE_PATH__|${APP_BASE_PATH}|g" "${WEB_ROOT}/.htaccess"

          rm -rf "${TMP_DIR}"
          rm -f "${TMP_ARCHIVE}"

          echo "Deployment complete. Static files copied to ${WEB_ROOT}."
          echo "If Apache vhost changed, run: sudo systemctl reload apache2"
          EOF
