name: Build and Deploy Recruitment Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  APP_PORT: "5007"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          VITE_BASE44_APP_ID: ${{ secrets.VITE_BASE44_APP_ID }}
          VITE_BASE44_APP_BASE_URL: ${{ secrets.VITE_BASE44_APP_BASE_URL }}
        run: npm run build

      - name: Create deploy archive
        run: tar -czf dist.tar.gz dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: recruitment-dist
          path: dist.tar.gz
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: recruitment-dist

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa_deploy
          chmod 600 ~/.ssh/id_rsa_deploy
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload artifact to VPS
        run: |
          scp -i ~/.ssh/id_rsa_deploy dist.tar.gz "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/recruitment-dist.tar.gz"

      - name: Deploy dist only
        run: |
          ssh -i ~/.ssh/id_rsa_deploy "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'bash -s' << 'EOF'
          set -euo pipefail

          DEPLOY_ROOT="${{ secrets.VPS_DEPLOY_ROOT }}"
          RELEASE_DIR="${DEPLOY_ROOT}/dist"
          TMP_ARCHIVE="/tmp/recruitment-dist.tar.gz"

          mkdir -p "${DEPLOY_ROOT}"
          rm -rf "${RELEASE_DIR}"
          mkdir -p "${RELEASE_DIR}"
          tar -xzf "${TMP_ARCHIVE}" -C "${DEPLOY_ROOT}"
          rm -f "${TMP_ARCHIVE}"

          echo "Deployment complete. Dist files are updated for port ${{ env.APP_PORT }}."
          echo "Run Apache reload manually after server config changes."
          EOF